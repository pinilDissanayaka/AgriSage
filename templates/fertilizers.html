{% extends "base.html" %}

{% block head %}
<title>AGRISAGE / Fertilizers</title>
{% endblock%}


{% block main %}
<main id="main" class="main">

  <div class="pagetitle">
    <h1>Fertilizers</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/adminDashboard">Home</a></li>
        <li class="breadcrumb-item active">Fertilizers</li>
      </ol>
    </nav>
  </div>
  <!-- End Page Title -->

  <section class="section dashboard">
    <div class="col-lg">
      <div class="row">
        {% if fertilizers %}
          {% for fertilizer in fertilizers %}
            <!-- User Card -->
            <div class="col-xxl-4 col-md-6">
              <div class="card info-card">
                <div class="card-body">
                  <h5 class="card-title">Device ID<span></span></h5>
                  <div class="d-flex align-items-center">
                    <div class="card-icon rounded-circle d-flex align-items-center justify-content-center">
                      <i class="bi bi-people"></i>
                    </div>
                    <div class="ps-3">
                      <h6>{{ fertilizer }}</h6>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- End User Card -->
          {% endfor %}
        {% else %}
            product not found
        {% endif %}
      </div>
    </div>
  </section>
</main>
{% endblock %}
